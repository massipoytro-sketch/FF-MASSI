workflows:
  android-release:
    name: Build Android APK
    max_build_duration: 120
    environment:
      android:
        ndk: "25.2.9519653"
        cmake: "3.22.1"
        gradle:
          - gradle@8.0
      java: 17
      cocoapods: default
    scripts:
      - name: Build APK
        script: |
          cd $CM_BUILD_DIR
          ./gradlew assembleRelease
    artifacts:
      - app/build/outputs/apk/release/*.apk
