workflows:
  android-release:
    name: Build Android APK
    max_build_duration: 120
    environment:
      java: "17"
      android:
        ndk: "25.2.9519653"
        cmake: "3.22.1"
    scripts:
      - name: Make gradlew executable
        script: chmod +x gradlew
      - name: Build APK
        script: ./gradlew assembleRelease
    artifacts:
      - app/build/outputs/apk/release/*.apk
